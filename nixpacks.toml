[variables]
NIXPACKS_PHP_VERSION = "8.4"

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm ci",
  "npm run build"
]

[start]
cmd = "php artisan config:clear && php artisan view:clear && php artisan pos:production-preflight --no-interaction && php artisan migrate --force && php -d variables_order=EGPCS artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
